<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WERK · Passwort ändern</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/session.js" defer></script>
  </head>
  <body>
    <div class="login-shell" data-authenticated-page="/change-password">
      <header class="login-header"><a class="brand" href="/"><span class="brand-mark"><span class="brand-mark-dot"></span></span><span class="brand-name">WERK</span></a></header>
      <main class="login-card">
        <p class="login-kicker">Erstanmeldung</p>
        <div class="login-heading"><h1>Passwort ändern</h1><p>Das temporäre Passwort muss vor der weiteren Nutzung ersetzt werden.</p></div>
        <form class="login-form" data-password-form>
          <label class="form-field"><span>Aktuelles Passwort</span><input name="current_password" type="password" autocomplete="current-password" required autofocus /></label>
          <label class="form-field"><span>Neues Passwort</span><input name="new_password" type="password" autocomplete="new-password" minlength="12" maxlength="1024" required /></label>
          <label class="form-field"><span>Neues Passwort bestätigen</span><input name="confirm_password" type="password" autocomplete="new-password" minlength="12" maxlength="1024" required /></label>
          <p class="form-notice" data-page-notice role="status" hidden></p>
          <button class="button button-primary login-submit" type="submit">Passwort speichern</button>
        </form>
        <button class="button button-secondary logout-button" data-page-logout type="button">Abmelden</button>
      </main>
      <footer class="login-footer"><span class="mono">WERK · CORE IDENTITY</span></footer>
    </div>
  </body>
</html>
