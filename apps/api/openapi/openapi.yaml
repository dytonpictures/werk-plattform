openapi: 3.1.0
info:
  title: WERK API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /ready:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: Service dependencies are ready
        "503":
          description: A dependency is unavailable
  /api/v1/system/info:
    get:
      operationId: getSystemInfo
      responses:
        "200":
          description: Public system information
          content:
            application/json:
              schema:
                type: object
                required: [name, version, environment, apiVersion]
                properties:
                  name: { type: string }
                  version: { type: string }
                  environment: { type: string }
                  apiVersion: { type: string }
  /api/v1/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "204": { description: Session cookie issued }
        "401": { description: Generic invalid credentials response }
  /api/v1/auth/logout:
    post:
      operationId: logout
      responses:
        "204": { description: Session revoked }
  /api/v1/auth/me:
    get:
      operationId: currentUser
      responses:
        "200": { description: Current authenticated user }
        "401": { description: No valid session }
components:
  schemas:
    Status:
      type: object
      required: [status]
      properties:
        status: { type: string }
