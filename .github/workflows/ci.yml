name: CI

on:
  push:
    branches: [main, 'agent/**']
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache: true
      - run: gofmt -d .
      - run: go vet ./...
      - run: go test ./... -cover
      - run: go build ./cmd/server

  frontend:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  contracts:
    name: Contracts and Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci --ignore-scripts
      - run: node -e "const fs=require('fs'); const yaml=fs.readFileSync('apps/api/openapi/openapi.yaml','utf8'); if (!yaml.includes('openapi: 3.1.0')) process.exit(1)"
      - run: POSTGRES_PASSWORD=ci-only-password docker compose config --quiet
